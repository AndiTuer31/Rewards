<title>Rico's Rewards</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F4F3EE;
  --surface:#FFFFFF;
  --surface2:#EEECE5;
  --border:#E2DFD6;
  --text:#16150E;
  --muted:#918F87;
  --green:#2A6048;
  --green-l:#CBE8D7;
  --green-d:#1D4532;
  --orange:#D4622A;
  --orange-l:#FAD9C8;
  --gold:#B8891E;
  --gold-l:#F7EECB;
  --blue:#2B5FB8;
  --blue-l:#D6E4FF;
  --r:18px;--rs:11px;
  --red:#B52A2A;--red-l:#FDEAEA;--red-d:#8C1A1A;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:max(100px,env(safe-area-inset-bottom,0px));-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;}

/* ── HEADER ─────────────────────────────────── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}

.hdr-main{display:flex;align-items:center;gap:12px;padding:14px 18px;}
.logo{font-size:.95rem;font-weight:800;letter-spacing:-.02em;flex:1;}
.logo em{color:var(--green);font-style:normal;}

/* Points hero */
.pts-hero{display:flex;flex-direction:column;align-items:flex-end;}
.pts-hero-num{font-family:'DM Mono',monospace;font-size:1.25rem;font-weight:500;line-height:1;color:var(--green);}
.pts-hero-num.bump{animation:bump .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes bump{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.pts-hero-label{font-size:.62rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}

/* Streak chip */
.streak-chip{background:var(--gold-l);border:1px solid #E8D68A;color:var(--gold);border-radius:100px;padding:5px 11px;font-size:.72rem;font-weight:700;white-space:nowrap;}

/* Progress section */
.hdr-progress{padding:0 18px 14px;}
.prog-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
.prog-title{font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
.prog-status{font-size:.72rem;font-weight:700;color:var(--text);}
.prog-status.goal{color:var(--gold);}
.bar-wrap{position:relative;height:9px;}
.bar-track{width:100%;height:100%;background:var(--surface2);border-radius:100px;overflow:hidden;}
.bar-fill{height:100%;border-radius:100px;transition:width .55s cubic-bezier(.34,1.1,.64,1);}
.bar-fill.normal{background:linear-gradient(90deg,var(--green),#4BAD7A);}
.bar-fill.reached{background:linear-gradient(90deg,var(--gold),#E8C040);}
.goal-pin{position:absolute;top:50%;transform:translate(-50%,-50%);width:3px;height:15px;background:var(--orange);border-radius:3px;}
.goal-pip{position:absolute;top:calc(100% + 3px);transform:translateX(-50%);font-size:.6rem;color:var(--orange);font-weight:700;white-space:nowrap;}

/* Tabs */
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 18px;border-top:1px solid var(--border);}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 14px;font-size:.77rem;font-weight:600;cursor:pointer;border:none;border-bottom:2.5px solid transparent;background:none;color:var(--muted);transition:all .18s;white-space:nowrap;flex-shrink:0;}
.tab.active{color:var(--text);border-bottom-color:var(--text);}


/* ── SECTIONS ─────────────────────────────────── */
.sec{padding:18px 16px;display:none;}
.sec.active{display:block;}
.sec-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px;}

/* ── ACTIVITY CARDS ────────────────────────────── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;}
@media(max-width:390px){.grid{grid-template-columns:1fr;}}

.acard{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  padding:18px 14px 16px;
  cursor:pointer;
  transition:transform .18s,box-shadow .18s,border-color .18s,background .18s;
  position:relative;
  overflow:hidden;
  user-select:none;
  touch-action:manipulation;
  -webkit-touch-callout:none;
}
/* Weight indicator — left border thickness by pts tier */
.acard::before{
  content:'';position:absolute;left:0;top:16px;bottom:16px;
  width:3px;border-radius:0 3px 3px 0;
  background:var(--border);
  transition:background .2s;
}
.acard.tier-med::before{background:#A8D5BC;}
.acard.tier-high::before{background:var(--green);}
.acard.done::before{background:var(--green);}


.acard:active{transform:scale(.96);transition:transform .1s;}
.acard.done{background:var(--green-l);border-color:var(--green);cursor:pointer;}


/* ripple */
.acard .ripple{position:absolute;border-radius:50%;background:rgba(42,96,72,.18);transform:scale(0);animation:ripple-anim .5s linear;pointer-events:none;}
@keyframes ripple-anim{to{transform:scale(4);opacity:0;}}

/* check badge */
.acard-check{
  position:absolute;top:11px;right:11px;
  width:22px;height:22px;
  background:var(--green);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:.7rem;
  transform:scale(0);transition:transform .25s cubic-bezier(.34,1.56,.64,1);
}
.acard.done .acard-check{transform:scale(1);}

.acard-emoji{font-size:1.7rem;margin-bottom:10px;display:block;}

.acard-name{font-size:.88rem;font-weight:600;margin-bottom:6px;line-height:1.35;}
.acard.done .acard-name{color:var(--green-d);}

/* pts tag */
.acard-pts{
  display:inline-block;
  font-family:'DM Mono',monospace;font-size:.74rem;font-weight:500;
  background:var(--surface2);color:var(--muted);
  padding:2px 8px;border-radius:100px;
  transition:background .2s,color .2s;
}
.acard.tier-high .acard-pts{background:var(--green-l);color:var(--green-d);}
.acard.done .acard-pts{background:rgba(42,96,72,.15);color:var(--green);}

/* undo hint */
.undo-hint{font-size:.62rem;color:var(--green);font-weight:500;margin-top:6px;opacity:.75;}

/* reset */
.reset-wrap{text-align:center;padding-top:4px;}
.reset-btn{background:none;border:1.5px solid var(--border);border-radius:100px;padding:9px 22px;font-family:'Sora',sans-serif;font-size:.77rem;color:var(--muted);cursor:pointer;transition:all .18s;}



/* ── BAD HABIT CARDS ───────────────────────────── */
.bad-divider{display:flex;align-items:center;gap:10px;margin:4px 0 16px;}
.bad-divider span{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--red);white-space:nowrap;}
.bad-divider::before,.bad-divider::after{content:'';flex:1;height:1px;background:var(--red-l);}

.bcard{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  padding:18px 14px 16px;
  cursor:pointer;
  transition:transform .1s,background .18s,border-color .18s;
  position:relative;
  overflow:hidden;
  user-select:none;
  touch-action:manipulation;
  -webkit-touch-callout:none;
}
.bcard::before{
  content:'';position:absolute;left:0;top:16px;bottom:16px;
  width:3px;border-radius:0 3px 3px 0;
  background:var(--red-l);
}
.bcard:active{transform:scale(.96);transition:transform .1s;}
.bcard.logged{background:var(--red-l);border-color:var(--red);}
.bcard.logged::before{background:var(--red);}

.bcard-count{
  position:absolute;top:11px;right:11px;
  min-width:22px;height:22px;padding:0 5px;
  background:var(--red);border-radius:100px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:.68rem;font-weight:700;
  font-family:'DM Mono',monospace;
  transform:scale(0);transition:transform .25s cubic-bezier(.34,1.56,.64,1);
}
.bcard.logged .bcard-count{transform:scale(1);}
.bcard-emoji{font-size:1.7rem;margin-bottom:10px;display:block;}
.bcard-name{font-size:.88rem;font-weight:600;margin-bottom:6px;line-height:1.35;}
.bcard.logged .bcard-name{color:var(--red-d);}
.bcard-pts{
  display:inline-block;
  font-family:'DM Mono',monospace;font-size:.74rem;font-weight:500;
  background:var(--surface2);color:var(--muted);
  padding:2px 8px;border-radius:100px;
}
.bcard.logged .bcard-pts{background:rgba(181,42,42,.12);color:var(--red);}
.bcard-undo{font-size:.62rem;color:var(--red);font-weight:500;margin-top:6px;opacity:.75;}

/* ── REWARD CARDS ──────────────────────────────── */
.rcard{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--r);padding:14px 15px;
  display:flex;align-items:center;gap:12px;
  margin-bottom:9px;transition:all .2s;
  position:relative;overflow:hidden;
}
.rcard.locked{background:var(--bg);opacity:.65;}
.rcard-emoji{font-size:1.3rem;flex-shrink:0;transition:transform .2s;}

.rcard-info{flex:1;min-width:0;}
.rcard-name{font-size:.83rem;font-weight:600;}
.rcard.locked .rcard-name{color:var(--muted);}
.rcard-cost{font-family:'DM Mono',monospace;font-size:.73rem;color:var(--gold);margin-top:3px;}
.rcard.locked .rcard-cost{color:var(--muted);}

/* lock icon */
.lock-icon{font-size:.85rem;color:var(--muted);flex-shrink:0;padding-right:2px;}

/* progress mini bar on locked cards */
.rcard-minibar{height:3px;background:var(--surface2);border-radius:100px;margin-top:6px;overflow:hidden;}
.rcard-minibar-fill{height:100%;background:var(--gold);border-radius:100px;transition:width .4s;}

.rdm-btn{padding:11px 16px;background:var(--gold);color:#fff;border:none;border-radius:var(--rs);font-family:'Sora',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;}


/* ── STATS ─────────────────────────────────────── */
.week-chart{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px;}
.week-chart h4{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}
.bars{display:flex;align-items:flex-end;gap:7px;height:64px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.bar-seg{width:100%;background:var(--green-l);border-radius:5px 5px 0 0;min-height:3px;transition:height .4s ease;}
.bar-seg.filled{background:var(--green);}
.bar-day{font-size:.61rem;color:var(--muted);font-weight:600;}
.bar-day.today{color:var(--text);font-weight:800;}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-box{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;}
.stat-val{font-size:1.7rem;font-weight:800;letter-spacing:-.04em;line-height:1;}
.stat-val.g{color:var(--green);}
.stat-val.o{color:var(--gold);}
.stat-val.b{color:var(--blue);}
.stat-val.r{color:var(--orange);}
.stat-key{font-size:.7rem;color:var(--muted);margin-top:5px;font-weight:500;}

/* ── HISTORY ───────────────────────────────────── */
.hday-group{margin-bottom:18px;}
.hday-label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.hitem{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.hitem:last-child{border-bottom:none;}
.h-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
.h-dot.e{background:var(--green-l);}
.h-dot.s{background:var(--orange-l);}
.h-dot.bad{background:var(--red-l);}
.h-pts.bad{color:var(--red);}
.h-info{flex:1;}
.h-name{font-size:.82rem;font-weight:500;}
.h-time{font-size:.68rem;color:var(--muted);margin-top:1px;}
.h-pts{font-family:'DM Mono',monospace;font-size:.8rem;font-weight:600;}
.h-pts.e{color:var(--green);}
.h-pts.s{color:var(--orange);}

/* ── MANAGE ────────────────────────────────────── */
.msec{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px;}
.msec h3{font-size:.82rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.mitem{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);font-size:.81rem;}
.mitem:last-of-type{border-bottom:none;}
.mi-e{font-size:1rem;width:22px;text-align:center;}
.mi-n{flex:1;font-weight:500;}
.mi-p{font-family:'DM Mono',monospace;font-size:.73rem;color:var(--muted);}
/* tier dot */
.mi-tier{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.del{background:none;border:none;color:var(--muted);cursor:pointer;padding:3px 7px;border-radius:6px;transition:all .15s;font-size:.85rem;}
.del:hover{background:#FFE4E4;color:#B52A2A;}

.add-form{display:grid;grid-template-columns:50px 1fr 68px auto;gap:7px;margin-top:12px;align-items:center;}
@media(max-width:390px){.add-form{grid-template-columns:44px 1fr 60px auto;gap:5px;}}
.add-form input{padding:9px 10px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:'Sora',sans-serif;font-size:.79rem;background:var(--bg);color:var(--text);width:100%;outline:none;transition:border-color .15s;}
.add-form input:focus{border-color:var(--green);}
.add-btn{padding:9px 12px;background:var(--green);color:#fff;border:none;border-radius:var(--rs);font-family:'Sora',sans-serif;font-size:.77rem;font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap;}
.add-btn:hover{background:#1D4532;}

.danger-zone{background:#FFF5F5;border:1.5px solid #FFD5D5;border-radius:var(--r);padding:15px;margin-top:4px;}
.danger-zone h3{font-size:.81rem;font-weight:700;color:#B52A2A;margin-bottom:10px;}
.danger-btn{background:none;border:1.5px solid #FFAAAA;border-radius:var(--rs);padding:9px 14px;font-family:'Sora',sans-serif;font-size:.77rem;color:#B52A2A;cursor:pointer;transition:all .18s;width:100%;}
.danger-btn:hover{background:#FFE4E4;}

/* ── HISTORY FILTER ─────────────────────────────── */
.hist-filters{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;}
.hist-filters::-webkit-scrollbar{display:none;}
.hfilt{padding:6px 14px;border-radius:100px;border:1.5px solid var(--border);background:none;font-family:'Sora',sans-serif;font-size:.74rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .18s;}
.hfilt.active{background:var(--text);color:#fff;border-color:var(--text);}

/* ── UTILS ─────────────────────────────────────── */
.empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:.81rem;}
.empty .ei{font-size:1.9rem;margin-bottom:8px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--text);color:#fff;padding:11px 22px;border-radius:100px;font-size:.79rem;font-weight:500;z-index:999;transition:transform .3s cubic-bezier(.34,1.4,.64,1);pointer-events:none;white-space:nowrap;max-width:92vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);}
.confetti-piece{position:fixed;top:-10px;pointer-events:none;z-index:9999;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-main">
    <div class="logo">Rico's <em>Rewards</em> 🏆</div>
    <div class="streak-chip" id="streakChip">🔥 0 Tage</div>
    <div class="pts-hero">
      <div class="pts-hero-num" id="ptsNum">0</div>
      <div class="pts-hero-label">Punkte</div>
    </div>
  </div>

  <div class="hdr-progress">
    <div class="prog-meta">
      <span class="prog-title">Heute</span>
      <span class="prog-status" id="progStatus">0 / 0 Pts</span>
    </div>
    <div class="bar-wrap">
      <div class="bar-track"><div class="bar-fill normal" id="barFill" style="width:0%"></div></div>
      <div class="goal-pin" id="goalPin" style="left:70%;display:none"></div>
      <div class="goal-pip" id="goalPip" style="left:70%;display:none"></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('activities',this)">Aktivitäten</button>
    <button class="tab" onclick="switchTab('rewards',this)">Belohnungen</button>
    <button class="tab" onclick="switchTab('stats',this)">Stats</button>
    <button class="tab" onclick="switchTab('history',this)">Verlauf</button>
    <button class="tab" onclick="switchTab('manage',this)">Verwalten</button>
  </div>
</div>

<!-- ACTIVITIES -->
<div class="sec active" id="tab-activities">
  <div class="sec-label" id="actDayLabel">Heute</div>
  <div class="grid" id="actGrid"></div>
  <div class="bad-divider" id="badDivider" style="display:none"><span>⚠️ Bad Habits</span></div>
  <div class="grid" id="badGrid"></div>
  <div class="reset-wrap">
    <button class="reset-btn" onclick="resetDay()">🔄 Tag zurücksetzen</button>
  </div>
</div>

<!-- REWARDS -->

    <button class="hfilt" onclick="setHistFilter('earn',this)">✅ Aktivitäten</button>
    <button class="hfilt" onclick="setHistFilter('bad',this)">⚠️ Bad Habits</button>
    <button class="hfilt" onclick="setHistFilter('spend',this)">🎁 Eingelöst</button>
  </div>
  <div id="histList"></div>
</div>

<!-- MANAGE -->
<div class="sec" id="tab-manage">
  <div class="msec">
    <h3>⚡ Aktivitäten</h3>
    <div id="mActs"></div>
    <div class="add-form">
      <input id="nAE" placeholder="🏋️" maxlength="4">
      <input id="nAN" placeholder="Name">
      <input id="nAP" type="number" placeholder="Pts" min="1" max="999">
      <button class="add-btn" onclick="addAct()">+ Add</button>

  </div>
  <div class="msec">
    <h3>🎁 Belohnungen</h3>
    <div id="mRews"></div>
    <div class="add-form">
      <input id="nRE" placeholder="🎮" maxlength="4">
      <input id="nRN" placeholder="Name">
      <input id="nRC" type="number" placeholder="Pts" min="1" max="9999">
      <button class="add-btn" onclick="addRew()">+ Add</button>
    </div>
  </div>
  <div class="msec">
    <h3>⚠️ Bad Habits</h3>
    <div id="mBads"></div>
    <div class="add-form">
      <input id="nBE" placeholder="📱" maxlength="4">
      <input id="nBN" placeholder="Bad Habit">
      <input id="nBP" type="number" placeholder="Pts" min="1" max="999">
      <button class="add-btn" style="background:var(--red)" onclick="addBad()">+ Add</button>
    </div>
  </div>
  <div class="danger-zone">
    <h3>⚠️ Danger Zone</h3>
    <button class="danger-btn" onclick="resetAll()">Alle Daten löschen & neu starten</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DEFAULTS ─────────────────────────────────────────────────────────────────
const DACTS=[
  {id:1,emoji:'🇵🇹',name:'Portugiesisch-Lektion',pts:15},
  {id:2,emoji:'🏋️',name:'Gym-Session',pts:20},
  {id:3,emoji:'📖',name:'30 Min. lesen',pts:10},
  {id:4,emoji:'🦵',name:'Reha-Übungen',pts:15},
  {id:5,emoji:'🧠',name:'KI / Skill lernen',pts:10},
  {id:6,emoji:'⚽',name:'Aktiv draussen',pts:12},
];
const DBADS=[
  {id:101,emoji:'📱',name:'Zu lange Social Media',pts:10},
  {id:102,emoji:'🍟',name:'Fast Food gegessen',pts:15},
  {id:103,emoji:'😴',name:'Zu spät ins Bett',pts:10},
  {id:104,emoji:'⏭️',name:'Reha übersprungen',pts:20},
  {id:105,emoji:'🛋️',name:'Ganzen Tag faul',pts:15},
];
const DREWS=[
  {id:1,emoji:'🎮',name:'1h Gaming',cost:30},
  {id:2,emoji:'🍕',name:'Take-Away bestellen',cost:80},
  {id:3,emoji:'🎬',name:'Film-Abend',cost:50},
  {id:4,emoji:'🧘',name:'Freie Stunde (guilt-free)',cost:25},
  {id:5,emoji:'🎧',name:'Album komplett hören',cost:20},
  {id:6,emoji:'✈️',name:'Wochenendtrip planen',cost:500},
];

// ── STATE ─────────────────────────────────────────────────────────────────────
function loadState(){
  return {
    pts:         parseInt(localStorage.getItem('rr3_pts')||'0'),
    acts:        JSON.parse(localStorage.getItem('rr3_acts')||'null')||DACTS,
    rews:        JSON.parse(localStorage.getItem('rr3_rews')||'null')||DREWS,
    done:        JSON.parse(localStorage.getItem('rr3_done')||'[]'),
    hist:        JSON.parse(localStorage.getItem('rr3_hist')||'[]'),
    streak:      parseInt(localStorage.getItem('rr3_streak')||'0'),
    lastDay:     localStorage.getItem('rr3_lastDay')||'',
    nextId:      parseInt(localStorage.getItem('rr3_nid')||'200'),
    dailyPts:    JSON.parse(localStorage.getItem('rr3_dpts')||'{}'),
    totalEarned: parseInt(localStorage.getItem('rr3_te')||'0'),
    totalSpent:  parseInt(localStorage.getItem('rr3_ts')||'0'),
    bads:        JSON.parse(localStorage.getItem('rr3_bads')||'null')||DBADS,
    badCounts:   JSON.parse(localStorage.getItem('rr3_bcounts')||'{}'),
    bestStreak:  parseInt(localStorage.getItem('rr3_bs')||'0'),
  };
}
function saveState(){
  localStorage.setItem('rr3_pts',st.pts);
  localStorage.setItem('rr3_acts',JSON.stringify(st.acts));
  localStorage.setItem('rr3_rews',JSON.stringify(st.rews));
  localStorage.setItem('rr3_done',JSON.stringify(st.done));
  localStorage.setItem('rr3_hist',JSON.stringify(st.hist));
  localStorage.setItem('rr3_streak',st.streak);
  localStorage.setItem('rr3_lastDay',st.lastDay);
  localStorage.setItem('rr3_nid',st.nextId);
  localStorage.setItem('rr3_dpts',JSON.stringify(st.dailyPts));
  localStorage.setItem('rr3_te',st.totalEarned);
  localStorage.setItem('rr3_ts',st.totalSpent);
  localStorage.setItem('rr3_bads',JSON.stringify(st.bads));
  localStorage.setItem('rr3_bcounts',JSON.stringify(st.badCounts));
  localStorage.setItem('rr3_bs',st.bestStreak);
}
let st=loadState();

// ── DATE ──────────────────────────────────────────────────────────────────────
function today(){return new Date().toISOString().slice(0,10);}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
function last7(){const a=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(d.toISOString().slice(0,10));}return a;}
function fmtDay(iso){const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('de-CH',{weekday:'short',day:'numeric',month:'short'});}

// ── DAY ROLLOVER ──────────────────────────────────────────────────────────────
function checkRollover(){
  const td=today();
  if(st.lastDay===td) return;
  if(st.lastDay===yesterday()){
    if(st.done.length>0){st.streak+=1;if(st.streak>st.bestStreak)st.bestStreak=st.streak;}
    else st.streak=0;
  } else if(st.lastDay!==''){
    st.streak=0;
  }
  st.done=[];
  st.badCounts={};
  st.lastDay=td;
  saveState();
}
checkRollover();

// ── TIER HELPER ───────────────────────────────────────────────────────────────
function tier(pts){
  // relative to max activity pts
  const max=Math.max(...st.acts.map(a=>a.pts),1);
  if(pts>=max*0.8) return 'high';
  if(pts>=max*0.5) return 'med';
  return 'low';
}
function tierColor(t){return t==='high'?'var(--green)':t==='med'?'#A8D5BC':'var(--border)';}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  // pts hero
  document.getElementById('ptsNum').textContent=st.pts;

  // streak chip
  const s=st.streak;
  const sc=document.getElementById('streakChip');
  sc.textContent=s===0?'0 Tage':s===1?'🔥 1 Tag':`🔥 ${s} Tage`;
  sc.style.background=s>=3?'#FFF0C0':s>=1?'var(--gold-l)':'var(--surface2)';
  sc.style.color=s>=1?'var(--gold)':'var(--muted)';
  sc.style.borderColor=s>=1?'#E8D68A':'var(--border)';

  // day label
  const td=today();
  const dl=new Date(td+'T12:00:00');
  document.getElementById('actDayLabel').textContent=
    dl.toLocaleDateString('de-CH',{weekday:'long',day:'numeric',month:'long'});

  updateBar();
  renderActs();
  renderBads();
  renderRews();
  renderStats();
  renderHist();
  renderManage();
}

function updateBar(){
  const td=today();
  const maxPts=st.acts.reduce((s,a)=>s+a.pts,0);
  const earned=st.dailyPts[td]||0;
  // bad habit deductions today
  const badDeducted=st.hist.filter(h=>h.type==='bad'&&h.day===td).reduce((s,h)=>s+h.pts,0);
  const netto=Math.max(0,earned-badDeducted);
  const GOAL=Math.round(maxPts*0.7);
  const pct=maxPts===0?0:Math.min(100,(netto/maxPts)*100);
  const goalReached=netto>=GOAL;

  const fill=document.getElementById('barFill');
  fill.style.width=pct+'%';
  fill.className='bar-fill '+(goalReached?'reached':'normal');

  const ps=document.getElementById('progStatus');
  const nettoLabel=badDeducted>0?` (−${badDeducted} Abzug)`:'';
  ps.textContent=goalReached?'🎯 Tagesziel erreicht!':netto+' / '+maxPts+' Pts'+nettoLabel;
  ps.className='prog-status'+(goalReached?' goal':'');

  const pin=document.getElementById('goalPin');
  const pip=document.getElementById('goalPip');
  if(maxPts>0&&!goalReached){
    pin.style.display='block'; pip.style.display='block';
    pin.style.left='70%'; pip.style.left='70%';
    pip.textContent='Ziel '+GOAL+' Pts';
  } else {
    pin.style.display='none'; pip.style.display='none';
  }
}

function renderActs(){
  const g=document.getElementById('actGrid');
  g.innerHTML='';
  if(!st.acts.length){
    g.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ei">⚡</div>Keine Aktivitäten — unter "Verwalten" hinzufügen.</div>';
    return;
  }
  st.acts.forEach(a=>{
    const done=st.done.includes(a.id);
    const t=tier(a.pts);
    const c=document.createElement('div');
    c.className=`acard tier-${t}${done?' done':''}`;
    c.innerHTML=`
      <div class="acard-check">✓</div>
      <span class="acard-emoji">${a.emoji}</span>
      <div class="acard-name">${a.name}</div>
      <span class="acard-pts">+${a.pts} Pts</span>
      ${done?'<div class="undo-hint">↩ Tippen zum Rückgängig</div>':''}
    `;
    c.onclick=(e)=>{
      if(done){undo(a);}
      else{ripple(c,e);earn(a);}
    };
    g.appendChild(c);
  });
}


function renderBads(){
  const g=document.getElementById('badGrid');
  const div=document.getElementById('badDivider');
  g.innerHTML='';
  if(!st.bads.length){div.style.display='none';return;}
  div.style.display='flex';
  const td=today();
  st.bads.forEach(b=>{
    const count=(st.badCounts[td]&&st.badCounts[td][b.id])||0;
    const logged=count>0;
    const c=document.createElement('div');
    c.className='bcard'+(logged?' logged':'');
    c.innerHTML=`
      <div class="bcard-count">${count}x</div>
      <span class="bcard-emoji">${b.emoji}</span>
      <div class="bcard-name">${b.name}</div>
      <span class="bcard-pts">−${b.pts} Pts</span>
      ${logged?'<div class="bcard-undo">↩ Lang drücken zum Rückgängig</div>':''}
    `;
    c.onclick=(e)=>{ripple(c,e);logBad(b);};
    c.oncontextmenu=(e)=>{e.preventDefault();undoBad(b);};
    // long press for undo on mobile
    let pressTimer;
    c.addEventListener('touchstart',()=>{pressTimer=setTimeout(()=>undoBad(b),600);},{passive:true});
    c.addEventListener('touchend',()=>clearTimeout(pressTimer),{passive:true});
    c.addEventListener('touchmove',()=>clearTimeout(pressTimer),{passive:true});
    g.appendChild(c);
  });
}

function renderRews(){
  const l=document.getElementById('rewList');
  l.innerHTML='';
  if(!st.rews.length){
    l.innerHTML='<div class="empty"><div class="ei">🎁</div>Keine Belohnungen — unter "Verwalten" hinzufügen.</div>';
    return;
  }
  [...st.rews].sort((a,b)=>a.cost-b.cost).forEach(r=>{
    const can=st.pts>=r.cost;
    const pct=Math.min(100,Math.round((st.pts/r.cost)*100));
    const c=document.createElement('div');
    c.className='rcard'+(can?'':' locked');
    c.innerHTML=`
      <span class="rcard-emoji">${r.emoji}</span>
      <div class="rcard-info">
        <div class="rcard-name">${r.name}</div>
        <div class="rcard-cost">${r.cost} Pts</div>
        ${!can?`<div class="rcard-minibar"><div class="rcard-minibar-fill" style="width:${pct}%"></div></div>`:''}
      </div>
      ${can
        ? `<button class="rdm-btn" onclick="redeem(${r.id})">Einlösen</button>`
        : `<span class="lock-icon">🔒</span>`
      }
    `;
    l.appendChild(c);
  });
}

function renderStats(){
  const days=last7();
  const td=today();
  // net pts per day (earned - bad deductions)
  const netDay=d=>{
    const earned=st.dailyPts[d]||0;
    const bad=st.hist.filter(h=>h.type==='bad'&&h.day===d).reduce((s,h)=>s+h.pts,0);
    return Math.max(0,earned-bad);
  };
  const maxPts=Math.max(...days.map(d=>netDay(d)),1);
  const bars=document.getElementById('weekBars');
  bars.innerHTML='';
  const dow=['So','Mo','Di','Mi','Do','Fr','Sa'];
  days.forEach(d=>{
    const net=netDay(d);
    const bad=st.hist.filter(h=>h.type==='bad'&&h.day===d).reduce((s,h)=>s+h.pts,0);
    const pct=Math.max(Math.round((net/maxPts)*100),2);
    const badPct=net>0?Math.min(20,Math.round((bad/(net+bad))*30)):0;
    const isToday=d===td;
    const dd=new Date(d+'T12:00:00');
    const col=document.createElement('div');
    col.className='bar-col';
    col.innerHTML=`
      <div style="width:100%;display:flex;flex-direction:column;align-items:stretch;gap:1px;height:${pct}%">
        ${bad>0?`<div style="height:${badPct}%;min-height:3px;background:var(--red-l);border-radius:4px 4px 0 0;flex-shrink:0"></div>`:''}
        <div class="bar-seg${net>0?' filled':''}" style="height:100%;border-radius:${bad>0?'0':'4px 4px'} 0 0"></div>
      </div>
      <div class="bar-day${isToday?' today':''}">${dow[dd.getDay()]}</div>`;
    bars.appendChild(col);
  });

  const weekPts=days.reduce((s,d)=>s+(st.dailyPts[d]||0),0);
  const weekBad=st.hist.filter(h=>h.type==='bad'&&days.includes(h.day)).reduce((s,h)=>s+h.pts,0);
  const weekActs=st.hist.filter(h=>h.type==='earn'&&days.includes(h.day)).length;
  const weekBadCount=st.hist.filter(h=>h.type==='bad'&&days.includes(h.day)).length;
  // week goal: 5 active days out of 7
  const activeDays=days.filter(d=>(st.dailyPts[d]||0)>0).length;
  const weekGoal=5;
  const weekGoalPct=Math.round((activeDays/weekGoal)*100);

  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-box"><div class="stat-val g">${st.pts}</div><div class="stat-key">Aktuelle Punkte</div></div>
    <div class="stat-box"><div class="stat-val o">${weekPts}</div><div class="stat-key">Verdient diese Woche</div></div>
    <div class="stat-box"><div class="stat-val b">${weekActs}</div><div class="stat-key">Aktivitäten diese Woche</div></div>
    <div class="stat-box"><div class="stat-val r">−${weekBad}</div><div class="stat-key">Bad Habit Abzüge (${weekBadCount}x)</div></div>
    <div class="stat-box"><div class="stat-val r">${st.streak}</div><div class="stat-key">Streak 🔥</div></div>
    <div class="stat-box"><div class="stat-val o">${st.bestStreak}</div><div class="stat-key">Bester Streak 🏆</div></div>
    <div class="stat-box" style="grid-column:1/-1">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
        <div style="font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em">Wochenziel</div>
        <div style="font-size:.72rem;font-weight:700;color:var(--text)">${activeDays} / ${weekGoal} aktive Tage</div>
      </div>
      <div style="background:var(--surface2);border-radius:100px;height:8px;overflow:hidden">
        <div style="height:100%;width:${Math.min(100,weekGoalPct)}%;background:${activeDays>=weekGoal?'linear-gradient(90deg,var(--gold),#E8C040)':'linear-gradient(90deg,var(--blue),#5B8FE8)'};border-radius:100px;transition:width .5s"></div>
      </div>
      <div style="font-size:.68rem;color:var(--muted);margin-top:5px">${activeDays>=weekGoal?'🎉 Wochenziel erreicht!':'Noch '+(weekGoal-activeDays)+' Tag(e) bis zum Wochenziel'}</div>
    </div>
  `;
}

function renderHist(){
  const l=document.getElementById('histList');
  l.innerHTML='';
  if(!st.hist.length){l.innerHTML='<div class="empty"><div class="ei">📋</div>Noch keine Einträge.</div>';return;}
  const byDay={};
  const filtered=_histFilter==='all'?st.hist:st.hist.filter(h=>h.type===_histFilter);
  [...filtered].reverse().forEach(h=>{if(!byDay[h.day])byDay[h.day]=[];byDay[h.day].push(h);});
  Object.keys(byDay).sort((a,b)=>b.localeCompare(a)).slice(0,14).forEach(day=>{
    const grp=document.createElement('div');
    grp.className='hday-group';
    const label=day===today()?'Heute':day===yesterday()?'Gestern':fmtDay(day);
    grp.innerHTML=`<div class="hday-label">${label}</div>`;
    byDay[day].forEach(h=>{
      const el=document.createElement('div');
      el.className='hitem';
      const sign=h.type==='earn'?'+':'−';
      el.innerHTML=`<div class="h-dot ${h.type}">${h.emoji}</div>
        <div class="h-info"><div class="h-name">${h.name}</div><div class="h-time">${h.time}</div></div>
        <div class="h-pts ${h.type==='bad'?'bad':h.type}">${sign}${h.pts} Pts</div>`;
      grp.appendChild(el);
    });
    l.appendChild(grp);
  });
}

function renderManage(){
  const mb=document.getElementById('mBads');
  mb.innerHTML='';
  st.bads.forEach(b=>{
    const el=document.createElement('div');
    el.className='mitem';
    el.innerHTML=`<span class="mi-e">${b.emoji}</span>
      <span class="mi-n">${b.name}</span>
      <span class="mi-p" style="color:var(--red)">−${b.pts} Pts</span>
      <button class="del" onclick="delBad(${b.id})">✕</button>`;
    mb.appendChild(el);
  });
  const ma=document.getElementById('mActs');
  ma.innerHTML='';
  st.acts.forEach(a=>{
    const t=tier(a.pts);
    const el=document.createElement('div');
    el.className='mitem';
    el.innerHTML=`<span class="mi-e">${a.emoji}</span>
      <div class="mi-tier" style="background:${tierColor(t)}"></div>
      <span class="mi-n">${a.name}</span>
      <span class="mi-p">+${a.pts} Pts</span>
      <button class="del" onclick="delAct(${a.id})">✕</button>`;
    ma.appendChild(el);
  });
  const mr=document.getElementById('mRews');
  mr.innerHTML='';
  st.rews.forEach(r=>{
    const el=document.createElement('div');
    el.className='mitem';
    el.innerHTML=`<span class="mi-e">${r.emoji}</span>
      <span class="mi-n">${r.name}</span>
      <span class="mi-p">${r.cost} Pts</span>
      <button class="del" onclick="delRew(${r.id})">✕</button>`;
    mr.appendChild(el);
  });
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function earn(a){
  if(st.done.includes(a.id)) return;
  st.pts+=a.pts; st.totalEarned+=a.pts;
  st.done.push(a.id);
  const td=today();
  st.dailyPts[td]=(st.dailyPts[td]||0)+a.pts;
  st.lastDay=td;
  st.hist.push({emoji:a.emoji,name:a.name,pts:a.pts,type:'earn',day:td,
    time:new Date().toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'})});
  if(st.streak>st.bestStreak)st.bestStreak=st.streak;
  saveState(); render(); bumpPts();
  toast(`${a.emoji} +${a.pts} Pts — ${a.name}!`);
  if(st.pts>0&&st.pts%100===0) confetti();
}

function undo(a){
  st.done=st.done.filter(x=>x!==a.id);
  st.pts=Math.max(0,st.pts-a.pts);
  st.totalEarned=Math.max(0,st.totalEarned-a.pts);
  const td=today();
  st.dailyPts[td]=Math.max(0,(st.dailyPts[td]||0)-a.pts);
  const idx=st.hist.map((h,i)=>({h,i})).reverse().find(({h})=>h.type==='earn'&&h.name===a.name&&h.day===td);
  if(idx) st.hist.splice(idx.i,1);
  saveState(); render();
  toast(`↩️ ${a.name} rückgängig.`);
}

function redeem(id){
  const r=st.rews.find(x=>x.id===id);
  if(!r||st.pts<r.cost) return;
  st.pts-=r.cost; st.totalSpent+=r.cost;
  const td=today();
  st.hist.push({emoji:r.emoji,name:r.name,pts:r.cost,type:'spend',day:td,
    time:new Date().toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'})});
  saveState(); render();
  toast(`${r.emoji} Genossen: ${r.name}!`);
  confetti();
}

function resetDay(){
  if(!st.done.length){toast('Heute noch nichts erledigt.');return;}
  if(!confirm('Aktivitäten zurücksetzen? Punkte bleiben.')) return;
  st.done=[]; saveState(); render();
  toast('🔄 Aktivitäten zurückgesetzt.');
}

function logBad(b){
  const td=today();
  if(!st.badCounts[td]) st.badCounts[td]={};
  st.badCounts[td][b.id]=(st.badCounts[td][b.id]||0)+1;
  st.pts=Math.max(0,st.pts-b.pts);
  st.lastDay=td;
  st.hist.push({emoji:b.emoji,name:b.name,pts:b.pts,type:'bad',day:td,
    time:new Date().toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit'})});
  saveState(); render();
  toast(`${b.emoji} −${b.pts} Pts — ${b.name}`);
}

function undoBad(b){
  const td=today();
  if(!st.badCounts[td]||!st.badCounts[td][b.id]) return;
  st.badCounts[td][b.id]=Math.max(0,st.badCounts[td][b.id]-1);
  st.pts+=b.pts;
  const idx=st.hist.map((h,i)=>({h,i})).reverse().find(({h})=>h.type==='bad'&&h.name===b.name&&h.day===td);
  if(idx) st.hist.splice(idx.i,1);
  saveState(); render();
  toast(`↩️ ${b.name} rückgängig.`);
}

function addBad(){
  const e=document.getElementById('nBE').value.trim()||'⚠️';
  const n=document.getElementById('nBN').value.trim();
  const p=parseInt(document.getElementById('nBP').value);
  if(!n||!p||p<1){toast('⚠️ Name und Punkte eingeben.');return;}
  st.bads.push({id:st.nextId++,emoji:e,name:n,pts:p});
  document.getElementById('nBE').value='';
  document.getElementById('nBN').value='';
  document.getElementById('nBP').value='';
  saveState(); render();
  toast(`✅ "${n}" hinzugefügt!`);
}

function delBad(id){st.bads=st.bads.filter(b=>b.id!==id);saveState();render();}

function addAct(){
  const e=document.getElementById('nAE').value.trim()||'⚡';
  const n=document.getElementById('nAN').value.trim();
  const p=parseInt(document.getElementById('nAP').value);
  if(!n||!p||p<1){toast('⚠️ Name und Punkte eingeben.');return;}
  st.acts.push({id:st.nextId++,emoji:e,name:n,pts:p});
  document.getElementById('nAE').value='';
  document.getElementById('nAN').value='';
  document.getElementById('nAP').value='';
  saveState(); render();
  toast(`✅ "${n}" hinzugefügt!`);
}

function addRew(){
  const e=document.getElementById('nRE').value.trim()||'🎁';
  const n=document.getElementById('nRN').value.trim();
  const c=parseInt(document.getElementById('nRC').value);
  if(!n||!c||c<1){toast('⚠️ Name und Kosten eingeben.');return;}
  st.rews.push({id:st.nextId++,emoji:e,name:n,cost:c});
  document.getElementById('nRE').value='';
  document.getElementById('nRN').value='';
  document.getElementById('nRC').value='';
  saveState(); render();
  toast(`✅ "${n}" hinzugefügt!`);
}

function delAct(id){st.acts=st.acts.filter(a=>a.id!==id);st.done=st.done.filter(x=>x!==id);saveState();render();}
function delRew(id){st.rews=st.rews.filter(r=>r.id!==id);saveState();render();}

function resetAll(){
  if(!confirm('Wirklich ALLE Daten löschen?')) return;
  ['pts','acts','rews','done','hist','streak','lastDay','nid','dpts','te','ts','bads','bcounts','bs']
    .forEach(k=>localStorage.removeItem('rr3_'+k));
  st=loadState(); render();
  toast('🗑️ Alle Daten gelöscht.');
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function bumpPts(){
  const el=document.getElementById('ptsNum');
  el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
}

function ripple(card,e){
  const r=document.createElement('span');
  r.className='ripple';
  const rect=card.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height)*2;
  r.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;`;
  card.appendChild(r);
  setTimeout(()=>r.remove(),600);
}

let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2500);
}

function confetti(){
  const cols=['#2A6048','#4BAD7A','#D4622A','#B8891E','#2B5FB8','#F4A261'];
  for(let i=0;i<26;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    const size=5+Math.random()*7;
    el.style.cssText=`left:${Math.random()*100}vw;width:${size}px;height:${size}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation-duration:${1+Math.random()*1.2}s;
      animation-delay:${Math.random()*.4}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2400);
  }
}

let _histFilter='all';
function setHistFilter(f,btn){
  _histFilter=f;
  document.querySelectorAll('.hfilt').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderHist();
}

render();
</script>
</body>
</html>
